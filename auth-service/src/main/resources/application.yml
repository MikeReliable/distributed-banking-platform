server:
  port: ${SERVER_PORT:8443}
  ssl:
    enabled: true
    key-store: /certs/shared-services.p12
    key-store-password: ${SHARED_SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12
    key-alias: bank-shared-tls
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-auth:5432/auth}
    username: ${SPRING_DATASOURCE_USERNAME:auth}
    password: ${SPRING_DATASOURCE_PASSWORD:auth}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    user:
      name: disabled
      password: disabled

  kafka:
    bootstrap-servers: kafka:9092
    admin:
      auto-create: true
    consumer:
      group-id: auth-service-group
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    root: INFO

auth:
  internal-clients:
    transfer-service: ${INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET}
  rate-limit:
    login:
      max-requests: ${AUTH_RATE_LIMIT_LOGIN_MAX_REQUESTS:20}
      window-seconds: ${AUTH_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
    token:
      max-requests: ${AUTH_RATE_LIMIT_TOKEN_MAX_REQUESTS:40}
      window-seconds: ${AUTH_RATE_LIMIT_TOKEN_WINDOW_SECONDS:60}
  jwt:
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    audience:
      user: ${AUTH_JWT_AUDIENCE_USER:bank-rest-api}
      service: ${AUTH_JWT_AUDIENCE_SERVICE:bank-rest-internal}
    keystore:
      path: ${AUTH_JWT_KEYSTORE_PATH:/certs/auth-jwt.p12}
      password: ${AUTH_JWT_KEYSTORE_PASSWORD}
      alias: ${AUTH_JWT_KEY_ALIAS:auth-jwt}
      type: PKCS12

