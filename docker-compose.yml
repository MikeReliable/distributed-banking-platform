services:

  postgres-auth:
    image: postgres:15
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: ${DB_AUTH_PASSWORD:?DB_AUTH_PASSWORD is required}
    volumes:
      - pg-auth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  postgres-card:
    image: postgres:15
    container_name: postgres-card
    environment:
      POSTGRES_DB: card
      POSTGRES_USER: card
      POSTGRES_PASSWORD: ${DB_CARD_PASSWORD:?DB_CARD_PASSWORD is required}
    volumes:
      - pg-card-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U card" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  postgres-transfer:
    image: postgres:15
    container_name: postgres-transfer
    environment:
      POSTGRES_DB: transfer
      POSTGRES_USER: transfer
      POSTGRES_PASSWORD: ${DB_TRANSFER_PASSWORD:?DB_TRANSFER_PASSWORD is required}
    volumes:
      - pg-transfer-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U transfer" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  postgres-user:
    image: postgres:15
    container_name: postgres-user
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${DB_USERDB_PASSWORD:?DB_USERDB_PASSWORD is required}
    volumes:
      - pg-user-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d userdb" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      card-service:
          condition: service_started
      transfer-service:
          condition: service_started
    ports:
      - "8080:8443"
    environment:
      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /certs/shared-services.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SHARED_SSL_KEYSTORE_PASSWORD:?SHARED_SSL_KEYSTORE_PASSWORD is required}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bank-shared-tls
      JAVA_TOOL_OPTIONS: >
        -Djavax.net.ssl.trustStore=/certs/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:?TRUSTSTORE_PASSWORD is required}
    volumes:
      - ./certs:/certs:ro
    expose:
      - "8443"
    networks:
      - bank-network
      - backend-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth
      SPRING_DATASOURCE_USERNAME: auth
      SPRING_DATASOURCE_PASSWORD: ${DB_AUTH_PASSWORD:?DB_AUTH_PASSWORD is required}
      INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET: ${INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET:?INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET is required}
      AUTH_JWT_KEYSTORE_PASSWORD: ${AUTH_JWT_KEYSTORE_PASSWORD:?AUTH_JWT_KEYSTORE_PASSWORD is required}
      AUTH_JWT_KEY_ALIAS: ${AUTH_JWT_KEY_ALIAS:-auth-jwt}

      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /certs/shared-services.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SHARED_SSL_KEYSTORE_PASSWORD:?SHARED_SSL_KEYSTORE_PASSWORD is required}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bank-shared-tls
      JAVA_TOOL_OPTIONS: >
        -Djavax.net.ssl.trustStore=/certs/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:?TRUSTSTORE_PASSWORD is required}
    volumes:
      - ./certs:/certs:ro
    expose:
        - "8443"
    networks:
      - backend-network

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/userdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: ${DB_USERDB_PASSWORD:?DB_USERDB_PASSWORD is required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://auth-service:8443/auth/jwks
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /certs/shared-services.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SHARED_SSL_KEYSTORE_PASSWORD:?SHARED_SSL_KEYSTORE_PASSWORD is required}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bank-shared-tls
      JAVA_TOOL_OPTIONS: >
        -Djavax.net.ssl.trustStore=/certs/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:?TRUSTSTORE_PASSWORD is required}
    volumes:
      - ./certs:/certs:ro
    expose:
      - "8443"
    networks:
      - backend-network

  card-service:
    build:
      context: .
      dockerfile: card-service/Dockerfile
    container_name: card-service
    depends_on:
      postgres-card:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-card:5432/card
      SPRING_DATASOURCE_USERNAME: card
      SPRING_DATASOURCE_PASSWORD: ${DB_CARD_PASSWORD:?DB_CARD_PASSWORD is required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://auth-service:8443/auth/jwks
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /certs/shared-services.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SHARED_SSL_KEYSTORE_PASSWORD:?SHARED_SSL_KEYSTORE_PASSWORD is required}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bank-shared-tls
      JAVA_TOOL_OPTIONS: >
        -Djavax.net.ssl.trustStore=/certs/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:?TRUSTSTORE_PASSWORD is required}
    volumes:
      - ./certs:/certs:ro
    expose:
      - "8443"
    networks:
      - backend-network

  transfer-service:
    build:
      context: .
      dockerfile: transfer-service/Dockerfile
    container_name: transfer-service
    depends_on:
      postgres-transfer:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-transfer:5432/transfer
      SPRING_DATASOURCE_USERNAME: transfer
      SPRING_DATASOURCE_PASSWORD: ${DB_TRANSFER_PASSWORD:?DB_TRANSFER_PASSWORD is required}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://auth-service:8443/auth/jwks
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INTERNAL_CLIENT_TRANSFER_SERVICE_ID: transfer-service
      INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET: ${INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET:?INTERNAL_CLIENT_TRANSFER_SERVICE_SECRET is required}

      SERVER_PORT: 8443
      SERVER_SSL_ENABLED: "true"
      SERVER_SSL_KEY_STORE: /certs/shared-services.p12
      SERVER_SSL_KEY_STORE_PASSWORD: ${SHARED_SSL_KEYSTORE_PASSWORD:?SHARED_SSL_KEYSTORE_PASSWORD is required}
      SERVER_SSL_KEY_STORE_TYPE: PKCS12
      SERVER_SSL_KEY_ALIAS: bank-shared-tls
      JAVA_TOOL_OPTIONS: >
        -Djavax.net.ssl.trustStore=/certs/truststore.p12
        -Djavax.net.ssl.trustStorePassword=${TRUSTSTORE_PASSWORD:?TRUSTSTORE_PASSWORD is required}
    volumes:
      - ./certs:/certs:ro
    expose:
      - "8443"
    networks:
      - backend-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper


    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    expose:
      - "2181"
    healthcheck:
      test: [ "CMD", "bash", "-c", "echo srvr | nc -w 2 localhost 2181 | grep Mode" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - backend-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    expose:
      - "9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

networks:
  bank-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true

volumes:
  pg-auth-data:
  pg-card-data:
  pg-transfer-data:
  pg-user-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:


